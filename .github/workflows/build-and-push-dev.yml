name: Build and Push to ECR (dev)

on:
  push:
    branches: [main]
    paths:
      - "src/cart/**"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  ECR_REPO: ecommerce-dev/cart

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source-code repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::707938860152:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          docker build \
            -t $REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $REGISTRY/$ECR_REPO:latest \
            -f src/cart/src/Dockerfile \
            .
          docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPO:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Generate GitHub App token for infra repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}
          owner: Besso2003
          repositories: ecommerce-aws-eks-devops

      - name: Update image tag in infra repo
        run: |
          echo "DEBUG: IMAGE_TAG is '${{ env.IMAGE_TAG }}'"
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/Besso2003/ecommerce-aws-eks-devops.git
          cd ecommerce-aws-eks-devops
          sed -i "s|ecommerce-dev/cart:.*|ecommerce-dev/cart:${{ env.IMAGE_TAG }}|" \
            k8s/overlays/dev/patches/cart-patch.yaml
          echo "DEBUG: file content after sed:"
          cat k8s/overlays/dev/patches/cart-patch.yaml
          git config user.name "ecommerce-ci-bot[bot]"
          git config user.email "ecommerce-ci-bot[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/patches/cart-patch.yaml
          git commit -m "ci: update cart image to ${{ env.IMAGE_TAG }} [skip ci]"
          git push

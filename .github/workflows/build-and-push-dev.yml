name: Build and Push to ECR (dev)

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: "${{ steps.filter.outputs.changes }}"
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            accounting: src/accounting/**
            ad: src/ad/**
            cart: src/cart/**
            checkout: src/checkout/**
            currency: src/currency/**
            email: src/email/**
            frontend: src/frontend/**
            frontend-proxy: src/frontend-proxy/**
            fraud-detection: src/fraud-detection/**
            image-provider: src/image-provider/**
            load-generator: src/load-generator/**
            payment: src/payment/**
            product-catalog: src/product-catalog/**
            recommendation: src/recommendation/**
            shipping: src/shipping/**

  build-and-push:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve build settings for ${{ matrix.service }}
        id: resolve
        run: |
          case "${{ matrix.service }}" in
            cart)
              dockerfile="src/cart/src/Dockerfile"
              ecr_repo="ecommerce-dev/cart"
              ;;
            ad)
              dockerfile="src/ad/Dockerfile"
              ecr_repo="ecommerce-dev/ad-service"
              ;;
            recommendation)
              dockerfile="src/recommendation/Dockerfile"
              ecr_repo="ecommerce-dev/recommendation-service"
              ;;
            *)
              dockerfile="src/${{ matrix.service }}/Dockerfile"
              ecr_repo="ecommerce-dev/${{ matrix.service }}"
              ;;
          esac
          echo "context=." >> "$GITHUB_OUTPUT"
          echo "dockerfile=$dockerfile" >> "$GITHUB_OUTPUT"
          echo "ecr_repo=$ecr_repo" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::707938860152:role/github-actions-ecr-push
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPO: ${{ steps.resolve.outputs.ecr_repo }}
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          docker build \
            -t $REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $REGISTRY/$ECR_REPO:latest \
            -f ${{ steps.resolve.outputs.dockerfile }} \
            ${{ steps.resolve.outputs.context }}
          docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPO:latest

  update-manifests:
    needs: [detect-changes, build-and-push]
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token for infra repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}
          owner: Besso2003
          repositories: ecommerce-aws-eks-devops

      - name: Clone infra repo
        run: |
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/Besso2003/ecommerce-aws-eks-devops.git infra

      - name: Update image tags for all changed services
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          SERVICES='${{ needs.detect-changes.outputs.services }}'

          ecr_name_for() {
            case "$1" in
              ad) echo "ad-service" ;;
              recommendation) echo "recommendation-service" ;;
              *) echo "$1" ;;
            esac
          }

          echo "$SERVICES" | jq -r '.[]' | while read -r svc; do
            ecr_name=$(ecr_name_for "$svc")
            patch_file="infra/k8s/overlays/dev/patches/${svc}-patch.yaml"
            new_image_line="          image: 707938860152.dkr.ecr.eu-north-1.amazonaws.com/ecommerce-dev/${ecr_name}:${IMAGE_TAG}"

            if [ ! -f "$patch_file" ]; then
              echo "WARNING: $patch_file not found, skipping"
              continue
            fi

            if grep -q "image:.*ecommerce-dev/${ecr_name}:" "$patch_file"; then
              sed -i "s|ecommerce-dev/${ecr_name}:.*|ecommerce-dev/${ecr_name}:${IMAGE_TAG}|" "$patch_file"
              echo "Updated existing image line in $patch_file -> $IMAGE_TAG"
            else
              sed -i "/- name: ${svc}$/a\\${new_image_line}" "$patch_file"
              echo "Inserted new image line in $patch_file -> $IMAGE_TAG"
            fi
          done

      - name: Commit and push
        run: |
          cd infra
          git config user.name "ecommerce-ci-bot[bot]"
          git config user.email "ecommerce-ci-bot[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/patches/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            SERVICES='${{ needs.detect-changes.outputs.services }}'
            git commit -m "ci: update images for ${SERVICES} [skip ci]"
            git push
          fi